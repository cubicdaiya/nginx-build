name: govulncheck

on:
  push:
    branches:
      - master
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
      - Makefile
      - builder/**
      - command/**
      - config/**
      - configure/**
      - module3rd/**
      - openresty/**
      - util/**
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
      - Makefile
      - builder/**
      - command/**
      - config/**
      - configure/**
      - module3rd/**
      - openresty/**
      - util/**
      - '.github/workflows/security.yml'
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  govulncheck_job:
    runs-on: ubuntu-latest
    name: Run govulncheck
    timeout-minutes: 15
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@1935de498397aa7b9bf6ac7ca822ddb430a34843 # v0.0.31

      - id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: 1.26.4
          go-package: ./...
