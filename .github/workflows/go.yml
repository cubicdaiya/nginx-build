name: Go

on:
  pull_request:
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
      - Makefile
      - builder/**
      - command/**
      - config/**
      - configure/**
      - module3rd/**
      - nginx-build
      - nginx-build.go
      - openresty/**
      - util/**
      - '.github/workflows/go.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Build
        run: make
      - name: Test
        run: make check

  run-nginx-openssl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Run Nginx with OpenSSL
        run: |
          make
          ./nginx-build -c ./config/configure.example -m ./config/modules.json.example -d work -clear -pcre -zlib -openssl

  run-nginx-libressl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Run Nginx with LibreSSL
        run: |
          make
          ./nginx-build -c ./config/configure.example -m ./config/modules.json.example -d work -clear -pcre -zlib -libressl

  run-freenginx:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Run Nginx with FreeNginx
        run: |
          make
          ./nginx-build -c ./config/configure.example -m ./config/modules.json.example -d work -clear -freenginx -pcre -zlib -openssl

  run-openresty:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Run Nginx with OpenResty
        run: |
          make
          ./nginx-build -c ./config/configure.example -m ./config/modules.json.example -d work -clear -openresty -pcre -zlib -openssl

  run-angie:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Run Angie
        run: |
          make
          ./nginx-build \
            -c ./config/configure.example \
            -m ./config/modules.json.example \
            -d work \
            -clear \
            -pcre \
            -zlib \
            -openssl \
            -customnginx https://github.com/webserver-llc/angie.git \
            -customnginxname angie \
            -customnginxtag Angie-1.11.3

  run-nginx-brotli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Run Nginx with Brotli
        run: |
          make
          ./nginx-build -c ./config/configure.example -m ./config/modules.json.brotli -d work -clear -pcre -zlib -openssl

  run-nginx-boringssl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 90
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Install BoringSSL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libunwind-dev
      - name: Run Nginx with BoringSSL
        run: |
          make
          ./nginx-build -c ./config/configure.example -m ./config/modules.json.example -d work -clear -pcre -zlib \
            -customssl https://boringssl.googlesource.com/boringssl \
            -customsslname boringssl

  run-nginx-oqs-provider:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 90
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Run Nginx with oqs-provider
        run: |
          make
          ./nginx-build \
            -c ./config/configure.example \
            -m ./config/modules.json.example \
            -d work \
            -clear \
            -pcre \
            -zlib \
            -customssl https://github.com/open-quantum-safe/oqs-provider.git \
            -customsslname oqs-provider \
            -customssltag 0.9.0

  run-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@3a3a447ad3668a3e205bf1273f2f2806bbbd30f3 # v0.0.33
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4
      - name: Run nginx-build with patches
        run: |
          set -euxo pipefail
          make
          ./nginx-build \
            -c ./config/configure.example \
            -m ./config/modules.json.example \
            -d work \
            -clear \
            -pcre \
            -zlib \
            -openssl \
            -patch ./config/patches/nginx-add-file.patch \
            -patch openssl=./config/patches/openssl-add-file.patch
          nginx_patch_path=$(find work -name patch-ci-nginx.txt -print -quit)
          openssl_patch_path=$(find work -name patch-ci-openssl.txt -print -quit)
          test -n "$nginx_patch_path"
          test -n "$openssl_patch_path"
