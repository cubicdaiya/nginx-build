name: Renovate Config Validator

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-config-validator-ci.yml"

permissions:
  contents: read

jobs:
  renovate-config-validator:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@10fa5e7d8bf293cb679c9859f67d745c17cfc70f # v0.0.32

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: validate renovate.json
        run: npx --package=renovate@latest -c renovate-config-validator
