name: Renovate Config Validator

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-config-validator-ci.yml"

permissions:
  contents: read

jobs:
  renovate-config-validator:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@1935de498397aa7b9bf6ac7ca822ddb430a34843 # v0.0.31

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: validate renovate.json
        run: npx --package=renovate@latest -c renovate-config-validator
