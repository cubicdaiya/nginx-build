name: GitHub Actions Lint

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"
      - "actionlint.yml"
      - ".github/actionlint.yaml"
      - ".github/actionlint.yml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"
      - "actionlint.yml"
      - ".github/actionlint.yaml"
      - ".github/actionlint.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@777ddaafc9ec2e09c9779cdb860e75906adc19c2 # v0.0.34

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.4

      - name: Install linters
        run: |
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          GOBIN="$HOME/bin" go install github.com/suzuki-shunsuke/ghalint/cmd/ghalint@v1.5.5
          GOBIN="$HOME/bin" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Run ghalint
        run: ghalint run

      - name: Run actionlint
        run: actionlint
