name: GitHub Actions Lint

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"
      - "actionlint.yml"
      - ".github/actionlint.yaml"
      - ".github/actionlint.yml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"
      - "actionlint.yml"
      - ".github/actionlint.yaml"
      - ".github/actionlint.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@31366296cb918b7f1413829aafc16dcf18fe8518 # v0.0.35

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5

      - name: Install linters
        run: |
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          GOBIN="$HOME/bin" go install github.com/suzuki-shunsuke/ghalint/cmd/ghalint@v1.5.5
          GOBIN="$HOME/bin" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Run ghalint
        run: ghalint run

      - name: Run actionlint
        run: actionlint
