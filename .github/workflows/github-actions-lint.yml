name: GitHub Actions Lint

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"
      - "actionlint.yml"
      - ".github/actionlint.yaml"
      - ".github/actionlint.yml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"
      - "actionlint.yml"
      - ".github/actionlint.yaml"
      - ".github/actionlint.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Start cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@10fa5e7d8bf293cb679c9859f67d745c17cfc70f # v0.0.32

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.4

      - name: Install linters
        run: |
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          GOBIN="$HOME/bin" go install github.com/suzuki-shunsuke/ghalint/cmd/ghalint@v1.5.5
          GOBIN="$HOME/bin" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Run ghalint
        run: ghalint run

      - name: Run actionlint
        run: actionlint
